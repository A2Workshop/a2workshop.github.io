name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build static site
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            ./ _site/

          python3 <<'PY'
          from __future__ import annotations
          import hashlib
          from pathlib import Path

          root = Path("_site")
          hashable_suffixes = {".css", ".js", ".jpeg", ".jpg", ".png", ".webm", ".webp", ".gif"}
          reference_suffixes = {".css", ".html", ".js"}
          mapping: dict[str, str] = {}

          files = sorted(path for path in root.rglob("*") if path.is_file())

          for path in files:
              if path.suffix.lower() not in hashable_suffixes:
                  continue
              if path.name.lower().startswith("bootstrap"):
                  continue

              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              new_name = f"{path.stem}-{digest}{path.suffix}"
              new_path = path.with_name(new_name)
              relative_old = path.relative_to(root).as_posix()
              relative_new = new_path.relative_to(root).as_posix()

              path.rename(new_path)
              mapping[relative_old] = relative_new

          for path in sorted(root.rglob("*")):
              if not path.is_file() or path.suffix.lower() not in reference_suffixes:
                  continue

              text = path.read_text(encoding="utf-8")
              updated = text
              for old, new in mapping.items():
                  updated = updated.replace(old, new)

              if updated != text:
                  path.write_text(updated, encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
